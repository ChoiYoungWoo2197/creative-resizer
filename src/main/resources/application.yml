server:
  port: 8081

spring:
  application:
    name: creative-resizer

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  data:
    mongodb:
      uri: mongodb://localhost:27017/creative_resizer

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

creative:
  storage:
    upload-dir: /app/storage/uploads
    output-dir: /app/storage/outputs
    zip-dir: /app/storage/zips
  worker:
    url: http://banner-worker:5000
    connect-timeout-seconds: ${WORKER_CONNECT_TIMEOUT_SECONDS:20}
    analysis-read-timeout-seconds: ${WORKER_ANALYSIS_READ_TIMEOUT_SECONDS:120}
    generate-read-timeout-seconds: ${WORKER_GENERATE_READ_TIMEOUT_SECONDS:900}
  openai:
    api-key: ${OPENAI_API_KEY:}
    analysis-model: ${OPENAI_ANALYSIS_MODEL:gpt-5-mini}
    object-model: ${OPENAI_OBJECT_MODEL:gpt-5-mini}
    compare-model: ${OPENAI_COMPARE_MODEL:gpt-5-mini}
    fallback-model: ${OPENAI_FALLBACK_MODEL:gpt-4.1-mini}
    image-detail: ${OPENAI_IMAGE_DETAIL:high}

---
spring:
  config:
    activate:
      on-profile: local

  data:
    mongodb:
      uri: mongodb://localhost:27017/creative_resizer

  rabbitmq:
    host: localhost

creative:
  storage:
    upload-dir: C:/company/storage/creative/uploads
    output-dir: C:/company/storage/creative/outputs
    zip-dir: C:/company/storage/creative/zips
  worker:
    url: http://localhost:5000

---
spring:
  config:
    activate:
      on-profile: prod

  data:
    mongodb:
      uri: ${MONGODB_URI}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST}

creative:
  worker:
    url: http://creative-worker:5000
  openai:
    api-key: ${OPENAI_API_KEY}
