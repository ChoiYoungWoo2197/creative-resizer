spring:
  config:
    activate:
      on-profile: smoke

  data:
    mongodb:
      uri: ${SMOKE_MONGODB_URI:mongodb://mongo:27017/creative_resizer_stage8_smoke}

  rabbitmq:
    host: ${SMOKE_RABBITMQ_HOST:rabbitmq}
    port: ${SMOKE_RABBITMQ_PORT:5672}
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        auto-startup: false   # smoke: BannerSpec API 검증만, 배너 생성 비활성

creative:
  storage:
    upload-dir: /tmp/smoke/uploads
    output-dir: /tmp/smoke/outputs
    zip-dir: /tmp/smoke/zips
  worker:
    url: ${SMOKE_WORKER_URL:http://worker:5000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.h3.creative: INFO
    org.springframework.data.mongodb: WARN
    org.springframework.amqp: WARN
