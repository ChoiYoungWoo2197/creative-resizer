networks:
  smoke-net:
    driver: bridge

volumes:
  smoke-mongo-data:

services:

  # ── MongoDB (전용 smoke DB) ──────────────────────────────────
  mongo:
    image: mongo:7
    networks: [smoke-net]
    volumes:
      - smoke-mongo-data:/data/db
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── RabbitMQ (Spring AMQP 기동에 필요) ──────────────────────
  rabbitmq:
    image: rabbitmq:3-alpine
    networks: [smoke-net]
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 20s

  # ── Spring Boot API (JDK17 빌드 + 테스트 → 실행) ─────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.smoke
    networks: [smoke-net]
    environment:
      - SPRING_PROFILES_ACTIVE=smoke
      - SMOKE_MONGODB_URI=mongodb://mongo:27017/creative_resizer_smoke
      - SMOKE_RABBITMQ_HOST=rabbitmq
      - TZ=Asia/Seoul
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    ports:
      - "18082:8081"   # 디버깅용 외부 노출

  # ── Smoke HTTP Test Runner ───────────────────────────────────
  smoke:
    build:
      context: scripts
      dockerfile: Dockerfile.smoke-runner
    networks: [smoke-net]
    environment:
      - API_URL=http://api:8081
      - SMOKE_TIMEOUT=30
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "http_smoke_test.py"]
