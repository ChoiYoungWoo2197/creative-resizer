name: creative-resizer-stage8-smoke

networks:
  smoke-net:
    driver: bridge

volumes:
  stage8-mongo-data:

services:

  # ── MongoDB (smoke 전용 DB, 운영과 완전 분리) ──────────────────
  mongo:
    image: mongo:7
    networks: [smoke-net]
    volumes:
      - stage8-mongo-data:/data/db
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M

  # ── RabbitMQ (Spring AMQP 기동 요건, listener는 auto-startup=false) ──
  rabbitmq:
    image: rabbitmq:3-alpine
    networks: [smoke-net]
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Python Worker (WorkerResponse E2E 계약 검증) ─────────────────
  worker:
    build:
      context: ./worker
      dockerfile: ../Dockerfile.worker.smoke
    networks: [smoke-net]
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1536M

  # ── Spring Boot API (JDK17 compileJava + test → smoke 프로필 기동) ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.smoke
    networks: [smoke-net]
    environment:
      - SPRING_PROFILES_ACTIVE=smoke
      - SMOKE_MONGODB_URI=mongodb://mongo:27017/creative_resizer_stage8_smoke
      - SMOKE_RABBITMQ_HOST=rabbitmq
      - SMOKE_WORKER_URL=http://worker:5000
      - TZ=Asia/Seoul
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    ports:
      - "127.0.0.1:18082:8081"   # localhost 전용, 0.0.0.0 노출 금지
    deploy:
      resources:
        limits:
          memory: 1536M

  # ── Smoke HTTP Test Runner ────────────────────────────────────────
  smoke:
    build:
      context: scripts
      dockerfile: Dockerfile.smoke-runner
    networks: [smoke-net]
    environment:
      - API_URL=http://api:8081
      - WORKER_URL=http://worker:5000
      - SMOKE_TIMEOUT=30
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
