version: '3.8'

services:
  creative-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creative-nginx
    ports:
      - "3001:80"
    tmpfs:
      - /tmp
    security_opt:
      - label:disable
      - seccomp:unconfined
    depends_on:
      - creative-api
    restart: unless-stopped
    networks:
      - creative-net

  creative-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative-api
    ports:
      - "18081:8081"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
      # Worker HTTP timeout м„Өм •
      # /generateлҠ” мөңлҢҖ 9нҡҢ AI нҳём¶ң(3 spec Г— 3 attempt) вҶ’ 900s н•„мҡ”
      - WORKER_CONNECT_TIMEOUT_SECONDS=20
      - WORKER_ANALYSIS_READ_TIMEOUT_SECONDS=120
      - WORKER_GENERATE_READ_TIMEOUT_SECONDS=900
    volumes:
      - ./logs:/logs
      - /opt/creative-resizer/storage:/app/storage
    depends_on:
      - creative-worker
    restart: unless-stopped
    networks:
      - creative-net

  creative-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: creative-worker
    environment:
      - OUTPUT_DIR=/app/storage/outputs
      - ZIP_DIR=/app/storage/zips
      # в”Җв”Җ Stage 20.3 AI-Only Rendering (Semantic Scene Cleanup) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # AI_ONLY_RENDERING=true: лӘЁл“  л ҢлҚ”л§Ғмқ„ semantic_scene_cleanup нҢҢмқҙн”„лқјмқёмңјлЎң лқјмҡ°нҢ….
      # resize_mode='ai-auto'лЎң л“Өм–ҙмҳЁ мҡ”мІӯлҸ„ лҸҷмқјн•ҳкІҢ лқјмҡ°нҢ…лҗЁ.
      # Fail-closed: AI мӢӨнҢЁ мӢң fallback м—Ҷмқҙ м—җлҹ¬ л°ҳнҷҳ.
      - AI_ONLY_RENDERING=true
      # в”Җв”Җ Stage 19 Background Pipeline в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - BACKGROUND_PIPELINE_ENABLED=true
      - BACKGROUND_PIPELINE_COMPARE_ONLY=false
      - BACKGROUND_LOCAL_INPAINT_ENABLED=true
      - BACKGROUND_EXTERNAL_INPAINT_ENABLED=true
      # Stage 20.2 Smart Fit м •мұ… (н•ӯмғҒ false вҖ” ліҖкІҪ кёҲм§Җ)
      - BACKGROUND_SMART_FIT_ALLOWED=false
      - BACKGROUND_BLUR_FILL_ALLOWED=false
      - BACKGROUND_MIRROR_FILL_ALLOWED=false
      - BACKGROUND_STRETCH_FILL_ALLOWED=false
      # Stage E: Semantic Scene Cleanup (subject-preserving outpaint + pixel restore)
      # source_faithful_repairлҠ” мҳҒкө¬ м ңкұ°лҗЁ вҖ” CONFIG_LEGACY_PIPELINE_FORBIDDEN
      # BACKGROUND_AI_API_KEYлҠ” м„ңлІ„ .env нҢҢмқјм—җ м„Өм • н•„мҡ”
      - BACKGROUND_SOURCE_FAITHFUL_REPAIR_ENABLED=false
      - BACKGROUND_GENERATION_MODE=semantic_scene_cleanup
      - BACKGROUND_AI_MAX_ATTEMPTS=1
      - BACKGROUND_AI_API_KEY=${BACKGROUND_AI_API_KEY}
      # ALLOW_FAKE_PROVIDER=false: мҡҙмҳҒ нҷҳкІҪм—җм„ң FakeBackgroundProvider н—Ҳмҡ© кёҲм§Җ.
      # лЎңм»¬ н…ҢмҠӨнҠё мӢңм—җл§Ң trueлЎң м„Өм •. ліҖкІҪ кёҲм§Җ.
      - ALLOW_FAKE_PROVIDER=false
      # Typography Pipeline (Stage 20.1)
      - TYPOGRAPHY_PIPELINE_ENABLED=false
      # Stage 21.5: PSD Object Analysis вҖ” upload-time GPT on, generate-time GPT off, reuse enabled
      - PSD_OBJECT_ANALYSIS_ENABLED=false
      - PSD_OBJECT_ANALYSIS_ON_UPLOAD=true
      - PSD_OBJECT_ANALYSIS_REUSE_ENABLED=true
      - PSD_OBJECT_ANALYSIS_ON_GENERATE=false
      - PSD_OBJECT_ANALYSIS_REQUIRED_FOR_PSD=true
      # P0: Per-job work directory for debug artifacts + SHA-256 isolation
      - AI_WORK_DIR=/app/storage/work
    volumes:
      - /opt/creative-resizer/storage:/app/storage
    restart: unless-stopped
    networks:
      - creative-net

networks:
  creative-net:
    driver: bridge
