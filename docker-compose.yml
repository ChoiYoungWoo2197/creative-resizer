version: '3.8'

services:
  creative-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creative-nginx
    ports:
      - "3001:80"
    depends_on:
      - creative-api
    restart: unless-stopped
    networks:
      - creative-net

  creative-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative-api
    ports:
      - "18081:8081"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./logs:/logs
      - /opt/creative-resizer/storage:/app/storage
    depends_on:
      - creative-worker
    restart: unless-stopped
    networks:
      - creative-net

  creative-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: creative-worker
    environment:
      - OUTPUT_DIR=/app/storage/outputs
      - ZIP_DIR=/app/storage/zips
    volumes:
      - /opt/creative-resizer/storage:/app/storage
    restart: unless-stopped
    networks:
      - creative-net

networks:
  creative-net:
    driver: bridge
