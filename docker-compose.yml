version: '3.8'

services:
  creative-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creative-nginx
    ports:
      - "3001:80"
    tmpfs:
      - /tmp
    depends_on:
      - creative-api
    restart: unless-stopped
    networks:
      - creative-net

  creative-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative-api
    ports:
      - "18081:8081"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
    volumes:
      - ./logs:/logs
      - /opt/creative-resizer/storage:/app/storage
    depends_on:
      - creative-worker
    restart: unless-stopped
    networks:
      - creative-net

  creative-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: creative-worker
    environment:
      - OUTPUT_DIR=/app/storage/outputs
      - ZIP_DIR=/app/storage/zips
      # ── Stage 19 Background Pipeline ──────────────────────────────
      # Stage 20.3 SFR(Source-Faithful Repair)을 활성화하려면 아래 플래그를 true로 설정하고
      # BACKGROUND_AI_API_KEY 환경변수를 .env 파일에 추가해야 합니다.
      # 현재 기본값: 모두 false → smart-fit resize 그대로 사용됨 (Stage 20.3 비활성)
      - BACKGROUND_PIPELINE_ENABLED=false
      - BACKGROUND_PIPELINE_COMPARE_ONLY=true
      - BACKGROUND_LOCAL_INPAINT_ENABLED=true
      - BACKGROUND_EXTERNAL_INPAINT_ENABLED=false
      # Stage 20.2 Smart Fit 정책 (항상 false — 변경 금지)
      - BACKGROUND_SMART_FIT_ALLOWED=false
      - BACKGROUND_BLUR_FILL_ALLOWED=false
      - BACKGROUND_MIRROR_FILL_ALLOWED=false
      - BACKGROUND_STRETCH_FILL_ALLOWED=false
      # Stage 20.3 Source-Faithful Repair (OpenAI gpt-image-1)
      # 활성화 조건: BACKGROUND_PIPELINE_ENABLED=true + BACKGROUND_EXTERNAL_INPAINT_ENABLED=true
      #              + BACKGROUND_SOURCE_FAITHFUL_REPAIR_ENABLED=true
      #              + BACKGROUND_AI_API_KEY 설정 (docker-compose.override.yml 또는 .env)
      - BACKGROUND_SOURCE_FAITHFUL_REPAIR_ENABLED=false
      - BACKGROUND_GENERATION_MODE=
      - BACKGROUND_AI_MAX_ATTEMPTS=3
      # Typography Pipeline (Stage 20.1)
      - TYPOGRAPHY_PIPELINE_ENABLED=false
    volumes:
      - /opt/creative-resizer/storage:/app/storage
    restart: unless-stopped
    networks:
      - creative-net

networks:
  creative-net:
    driver: bridge
