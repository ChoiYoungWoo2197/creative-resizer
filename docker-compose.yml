version: '3.8'

services:
  creative-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creative-nginx
    ports:
      - "3001:80"
    depends_on:
      - creative-api
    restart: unless-stopped
    networks:
      - creative-net

  creative-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative-api
    ports:
      - "18081:8081"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI}
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - CREATIVE_STORAGE_UPLOAD_DIR=/app/storage/uploads
      - CREATIVE_STORAGE_OUTPUT_DIR=/app/storage/outputs
      - CREATIVE_STORAGE_ZIP_DIR=/app/storage/zips
      - CREATIVE_WORKER_URL=http://creative-worker:5000
    volumes:
      - ./logs:/logs
      - ${STORAGE_PATH:-./storage}:/app/storage
    depends_on:
      - creative-worker
    restart: unless-stopped
    networks:
      - creative-net

  creative-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: creative-worker
    environment:
      - OUTPUT_DIR=/app/storage/outputs
      - ZIP_DIR=/app/storage/zips
    volumes:
      - ${STORAGE_PATH:-./storage}:/app/storage
    restart: unless-stopped
    networks:
      - creative-net

networks:
  creative-net:
    driver: bridge
