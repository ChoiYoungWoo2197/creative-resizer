version: '3.8'

services:
  creative-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creative-nginx
    ports:
      - "3001:80"
    tmpfs:
      - /tmp
    security_opt:
      - label:disable
      - seccomp:unconfined
    depends_on:
      - creative-api
    restart: unless-stopped
    networks:
      - creative-net

  creative-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative-api
    ports:
      - "18081:8081"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
      # Worker HTTP timeout 설정
      # /generate는 최대 9회 AI 호출(3 spec × 3 attempt) → 900s 필요
      - WORKER_CONNECT_TIMEOUT_SECONDS=20
      - WORKER_ANALYSIS_READ_TIMEOUT_SECONDS=120
      - WORKER_GENERATE_READ_TIMEOUT_SECONDS=900
    volumes:
      - ./logs:/logs
      - /opt/creative-resizer/storage:/app/storage
    depends_on:
      - creative-worker
    restart: unless-stopped
    networks:
      - creative-net

  creative-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: creative-worker
    environment:
      - OUTPUT_DIR=/app/storage/outputs
      - ZIP_DIR=/app/storage/zips
      # ── Stage 20.3 AI-Only Rendering (Source-Faithful Repair) ────────────────
      # AI_ONLY_RENDERING=true: 모든 렌더링을 Stage 20.3 AI 파이프라인으로 라우팅.
      # resize_mode='ai-auto'로 들어온 요청도 동일하게 라우팅됨.
      # Fail-closed: AI 실패 시 fallback 없이 에러 반환.
      - AI_ONLY_RENDERING=true
      # ── Stage 19 Background Pipeline ──────────────────────────────────────────
      - BACKGROUND_PIPELINE_ENABLED=true
      - BACKGROUND_PIPELINE_COMPARE_ONLY=false
      - BACKGROUND_LOCAL_INPAINT_ENABLED=true
      - BACKGROUND_EXTERNAL_INPAINT_ENABLED=true
      # Stage 20.2 Smart Fit 정책 (항상 false — 변경 금지)
      - BACKGROUND_SMART_FIT_ALLOWED=false
      - BACKGROUND_BLUR_FILL_ALLOWED=false
      - BACKGROUND_MIRROR_FILL_ALLOWED=false
      - BACKGROUND_STRETCH_FILL_ALLOWED=false
      # Stage 20.3 Source-Faithful Repair (OpenAI gpt-image-1)
      # BACKGROUND_AI_API_KEY는 서버 .env 파일에 설정 필요
      - BACKGROUND_SOURCE_FAITHFUL_REPAIR_ENABLED=true
      - BACKGROUND_GENERATION_MODE=source_faithful_repair
      - BACKGROUND_AI_MAX_ATTEMPTS=1
      - BACKGROUND_AI_API_KEY=${BACKGROUND_AI_API_KEY}
      # Typography Pipeline (Stage 20.1)
      - TYPOGRAPHY_PIPELINE_ENABLED=false
      # P2: Disable GPT-4o-mini PSD object analysis for AI-only pipeline
      - PSD_OBJECT_ANALYSIS_ENABLED=false
      # P0: Per-job work directory for debug artifacts + SHA-256 isolation
      - AI_WORK_DIR=/app/storage/work
    volumes:
      - /opt/creative-resizer/storage:/app/storage
    restart: unless-stopped
    networks:
      - creative-net

networks:
  creative-net:
    driver: bridge
